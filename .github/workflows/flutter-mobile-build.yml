name: Mobile App Build (Manual)

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: "Build Linux desktop artifact"
        required: true
        type: boolean
        default: true
      build_android:
        description: "Build Android APK/AAB"
        required: true
        type: boolean
        default: true
      build_ios:
        description: "Build iOS IPA on macOS runner"
        required: true
        type: boolean
        default: true
      upload_to_testflight:
        description: "Upload signed IPA to TestFlight"
        required: true
        type: boolean
        default: false

env:
  FLUTTER_VERSION: "3.41.7"
  IOS_KEYCHAIN: build.keychain

jobs:
  linux:
    name: Build Linux Desktop
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Flutter Doctor
        working-directory: mobile
        run: flutter doctor -v

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build Linux desktop app
        working-directory: mobile
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release

      - name: Pack Linux artifact
        working-directory: mobile
        run: |
          cd build/linux/x64/release
          tar -czf alarm-messenger-linux-x64.tar.gz bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-messenger-linux-x64
          path: mobile/build/linux/x64/release/alarm-messenger-linux-x64.tar.gz
          retention-days: 30

  android:
    name: Build Android APK & AAB
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Flutter Doctor
        working-directory: mobile
        run: flutter doctor -v

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Android Debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Decode Keystore (Release)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > mobile/android/app/alarm-messenger.keystore
            echo "ANDROID_SIGNING_READY=true" >> "$GITHUB_ENV"
          else
            echo "ANDROID_SIGNING_READY=false" >> "$GITHUB_ENV"
          fi

      - name: Build Android Release APK
        if: env.ANDROID_SIGNING_READY == 'true'
        working-directory: mobile
        env:
          MYAPP_RELEASE_STORE_FILE: alarm-messenger.keystore
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload Release APK
        if: env.ANDROID_SIGNING_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Build Android App Bundle (AAB)
        if: env.ANDROID_SIGNING_READY == 'true'
        working-directory: mobile
        env:
          MYAPP_RELEASE_STORE_FILE: alarm-messenger.keystore
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload Release AAB
        if: env.ANDROID_SIGNING_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  ios:
    name: Build iOS IPA (macOS)
    if: ${{ inputs.build_ios }}
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Flutter Doctor
        working-directory: mobile
        run: flutter doctor -v

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Check iOS project
        working-directory: mobile
        run: |
          if [ ! -d "ios/Runner.xcodeproj" ]; then
            flutter create --org com.alarmmessenger --platforms=ios .
          fi

      - name: Setup iOS signing certificates
        if: vars.IOS_SIGNING_ENABLED == 'true'
        env:
          IOS_SIGNING_CERT: ${{ secrets.IOS_SIGNING_CERT }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          IOS_SIGNING_CERT_PASSWORD: ${{ secrets.IOS_SIGNING_CERT_PASSWORD }}
        run: |
          if [ -n "$IOS_SIGNING_CERT" ] && [ -n "$IOS_PROVISIONING_PROFILE" ] && [ -n "$IOS_SIGNING_CERT_PASSWORD" ]; then
            echo "$IOS_SIGNING_CERT" | base64 --decode > cert.p12
            echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision

            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
            cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

            security create-keychain -p actions "${{ env.IOS_KEYCHAIN }}"
            security default-keychain -s "${{ env.IOS_KEYCHAIN }}"
            security unlock-keychain -p actions "${{ env.IOS_KEYCHAIN }}"
            security import cert.p12 -k "${{ env.IOS_KEYCHAIN }}" -P "$IOS_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k actions "${{ env.IOS_KEYCHAIN }}"

            echo "SIGNING_CONFIGURED=true" >> "$GITHUB_ENV"
          else
            echo "SIGNING_CONFIGURED=false" >> "$GITHUB_ENV"
          fi

      - name: Build iOS IPA (signed)
        if: env.SIGNING_CONFIGURED == 'true'
        working-directory: mobile
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Build iOS IPA (unsigned, for AltStore self-signing)
        if: env.SIGNING_CONFIGURED != 'true'
        working-directory: mobile
        run: |
          echo "Building iOS app without code signing..."
          echo "Note: This creates an unsigned .app that needs to be signed with AltStore/AltServer"
          flutter build ios --release --no-codesign
          
          # Create IPA from unsigned build for AltStore
          echo "Creating IPA package for AltStore..."
          cd build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../alarm-messenger-unsigned.ipa Payload
          cd ../../..

      - name: Upload iOS IPA (signed)
        if: env.SIGNING_CONFIGURED == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: alarm-messenger-signed.ipa
          path: mobile/build/ios/ipa/*.ipa
          retention-days: 90
      
      - name: Upload iOS IPA (unsigned for AltStore)
        if: env.SIGNING_CONFIGURED != 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: alarm-messenger-unsigned.ipa
          path: mobile/alarm-messenger-unsigned.ipa
          retention-days: 90

      - name: Upload IPA to TestFlight
        if: env.SIGNING_CONFIGURED == 'true' && inputs.upload_to_testflight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: mobile/build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

  notify:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [linux, android, ios]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Summary
        run: |
          echo "## Flutter Mobile Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- Linux: ${{ needs.linux.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Android: ${{ needs.android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- iOS: ${{ needs.ios.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Linux tarball: see workflow artifacts when Linux build succeeded" >> $GITHUB_STEP_SUMMARY
          echo "- Android debug APK: see workflow artifacts when Android build succeeded" >> $GITHUB_STEP_SUMMARY
          echo "- Android release APK/AAB: available when Android signing secrets are configured" >> $GITHUB_STEP_SUMMARY
          echo "- iOS IPA: signed or unsigned artifact based on signing configuration" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.upload_to_testflight }}" == "true" ]]; then
            echo "- TestFlight upload requested: yes" >> $GITHUB_STEP_SUMMARY
          else
            echo "- TestFlight upload requested: no" >> $GITHUB_STEP_SUMMARY
          fi
