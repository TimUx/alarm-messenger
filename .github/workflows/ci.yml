name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server-test:
    name: Server – Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Run integration tests
        run: npm run test:integration
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Run critical coverage gate
        run: npm run test:coverage:critical
      - name: Build TypeScript
        run: npm run build

  docker-build:
    name: Docker – Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: server-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t alarm-messenger-server ./server

  flutter-analyze:
    name: Flutter – Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          # Dart >=3.10 required by app_links ^7.0.0; pin for reproducible CI
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true
      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: mobile
      - name: Analyze Flutter code
        run: flutter analyze
        working-directory: mobile
      - name: Run Flutter unit/widget tests
        run: flutter test test/unit test/widget
        working-directory: mobile
      - name: Install Linux desktop dependencies (integration_test / Linux build)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            xvfb
      - name: Run Flutter integration tests
        # Headless GHA has no $DISPLAY; GTK+Linux app needs a virtual framebuffer.
        run: xvfb-run -a flutter test integration_test
        working-directory: mobile
