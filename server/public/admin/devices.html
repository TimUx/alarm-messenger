<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm Messenger - Einsatzkräfte</title>
    <link rel="stylesheet" href="/admin/styles.css">
    <script src="/admin/theme.js"></script>
    <link rel="manifest" href="/admin/manifest.webmanifest">
    <meta name="theme-color" content="#c62828">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alarm Admin">
    <link rel="apple-touch-icon" href="/admin/icons/icon-192.png">
    <script src="/admin/pwa-register.js" defer></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>🚨 Alarm Messenger - Einsatzkräfte</h1>
            <div class="header-actions">
                <button id="theme-toggle" title="Theme wechseln" aria-label="Theme wechseln">🌙</button>
                <span id="username-display"></span>
                <button class="btn btn-secondary" id="logout-btn">Abmelden</button>
            </div>
        </header>

        <nav class="admin-nav">
            <a href="/admin/index.html">Dashboard</a>
            <a href="/admin/devices.html" class="active">Einsatzkräfte</a>
            <a href="/admin/groups.html">Alarm-Gruppen</a>
            <a href="/admin/alarms.html">Alarmierung</a>
            <a href="/admin/history.html">Einsatz-Historie</a>
            <a href="/admin/users.html">Benutzerverwaltung</a>
        </nav>

        <main class="dashboard-content">
            <section class="section">
                <div class="section-header">
                    <h2>Registrierte Einsatzkräfte</h2>
                    <button class="btn btn-secondary" id="refresh-devices-btn">🔄 Aktualisieren</button>
                </div>
                <div id="devices-list" class="devices-list">
                    <p class="loading">Lade Daten...</p>
                </div>
            </section>

            <!-- Edit Device Modal -->
            <div id="edit-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Einsatzkraft bearbeiten</h3>
                        <button class="close-btn" id="close-modal-btn" aria-label="Schließen">&times;</button>
                    </div>
                    <form id="editDeviceForm">
                        <input type="hidden" id="edit-device-id">
                        <div class="form-group">
                            <label for="edit-first-name">Vorname</label>
                            <input type="text" id="edit-first-name" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-last-name">Nachname</label>
                            <input type="text" id="edit-last-name" name="lastName" required>
                        </div>
                        <div class="form-group">
                            <label>Ausbildungsstand</label>
                            <div class="checkbox-group">
                                <label>
                                    <input type="checkbox" name="qual_machinist" id="edit-qual-machinist">
                                    Maschinist
                                </label>
                                <label>
                                    <input type="checkbox" name="qual_agt" id="edit-qual-agt">
                                    AGT (Atemschutzgeräteträger)
                                </label>
                                <label>
                                    <input type="checkbox" name="qual_paramedic" id="edit-qual-paramedic">
                                    Sanitäter
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Führungsrolle</label>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="leadership_role" value="none" id="edit-role-none" checked>
                                    Keine
                                </label>
                                <label>
                                    <input type="radio" name="leadership_role" value="groupLeader" id="edit-role-group">
                                    Gruppenführer
                                </label>
                                <label>
                                    <input type="radio" name="leadership_role" value="platoonLeader" id="edit-role-platoon">
                                    Zugführer
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="edit-assigned-groups">Zugeordnete Gruppen</label>
                            <div id="edit-assigned-groups" class="checkbox-group">
                                <p class="loading">Lade Gruppen...</p>
                            </div>
                        </div>
                        <div class="modal-actions">
                            <button type="button" class="btn btn-secondary" id="cancel-modal-btn">Abbrechen</button>
                            <button type="submit" class="btn btn-primary">Speichern</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- QR Code Modal -->
            <div id="qr-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>QR-Code für Geräteregistrierung</h3>
                        <button class="close-btn" id="close-qr-modal-btn" aria-label="Schließen">&times;</button>
                    </div>
                    <div class="qr-code-card">
                        <img id="qr-modal-image" alt="QR Code" style="max-width: 100%; height: auto;">
                        <div class="qr-code-info">
                            <p><strong>Device Token:</strong> <span id="qr-modal-token"></span></p>
                            <button type="button" class="btn btn-secondary" id="copy-qr-token-btn">Token kopieren</button>
                            <button type="button" class="btn btn-secondary" id="download-qr-modal-btn">QR-Code herunterladen</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ntfy Provisioning Modal -->
            <div id="ntfy-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>ntfy Subscription für Gerät</h3>
                        <button class="close-btn" id="close-ntfy-modal-btn" aria-label="Schließen">&times;</button>
                    </div>
                    <div class="qr-code-card">
                        <img id="ntfy-modal-image" alt="ntfy Subscription QR Code" style="max-width: 100%; height: auto;">
                        <div class="qr-code-info">
                            <p><strong>Topic:</strong> <span id="ntfy-modal-topic"></span></p>
                            <p><strong>Link:</strong> <span id="ntfy-modal-link"></span></p>
                            <button type="button" class="btn btn-secondary" id="copy-ntfy-topic-btn">Topic kopieren</button>
                            <button type="button" class="btn btn-secondary" id="copy-ntfy-link-btn">Link kopieren</button>
                            <button type="button" class="btn btn-secondary" id="download-ntfy-modal-btn">QR-Code herunterladen</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/admin/api-client.js"></script>
    <script src="/admin/devices.js"></script>
    <div id="toast-container" aria-live="polite" role="status"></div>
</body>
</html>
