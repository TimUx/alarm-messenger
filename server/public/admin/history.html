<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm Messenger - Einsatz Historie</title>
    <link rel="stylesheet" href="/admin/styles.css">
    <script src="/admin/theme.js"></script>
    <link rel="manifest" href="/admin/manifest.webmanifest">
    <meta name="theme-color" content="#c62828">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alarm Admin">
    <link rel="apple-touch-icon" href="/admin/icons/icon-192.png">
    <script src="/admin/pwa-register.js" defer></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>🚨 Alarm Messenger - Einsatz Historie</h1>
            <div class="header-actions">
                <button id="theme-toggle" title="Theme wechseln" aria-label="Theme wechseln">🌙</button>
                <span id="username-display"></span>
                <button class="btn btn-secondary" id="logout-btn">Abmelden</button>
            </div>
        </header>

        <nav class="admin-nav">
            <a href="/admin/index.html">Dashboard</a>
            <a href="/admin/devices.html">Einsatzkräfte</a>
            <a href="/admin/groups.html">Alarm-Gruppen</a>
            <a href="/admin/alarms.html">Alarmierung</a>
            <a href="/admin/history.html" class="active">Einsatz-Historie</a>
            <a href="/admin/users.html">Benutzerverwaltung</a>
        </nav>

        <main class="dashboard-content">
            <section class="section">
                <div class="section-header">
                    <h2>Alle Einsätze</h2>
                    <button class="btn btn-secondary" id="refresh-btn">🔄 Aktualisieren</button>
                </div>
                
                <!-- Filter and Sort Controls -->
                <div class="filter-sort-container">
                    <div class="filter-controls">
                        <input type="text" id="filter-keyword" class="form-input" placeholder="Stichwort filtern...">
                        <input type="text" id="filter-number" class="form-input" placeholder="Einsatznummer filtern...">
                        <input type="text" id="filter-location" class="form-input" placeholder="Ort filtern...">
                        <input type="text" id="filter-groups" class="form-input" placeholder="Gruppen filtern...">
                        <button class="btn btn-secondary" id="clear-filters-btn">Filter löschen</button>
                    </div>
                    <div class="sort-controls">
                        <label for="sort-by">Sortieren nach:</label>
                        <select id="sort-by" class="form-select">
                            <option value="date-desc">Datum (neueste zuerst)</option>
                            <option value="date-asc">Datum (älteste zuerst)</option>
                            <option value="keyword-asc">Stichwort (A-Z)</option>
                            <option value="keyword-desc">Stichwort (Z-A)</option>
                            <option value="number-asc">Einsatznummer (A-Z)</option>
                            <option value="number-desc">Einsatznummer (Z-A)</option>
                        </select>
                    </div>
                </div>
                
                <div id="emergencies-list" class="emergencies-list">
                    <p class="loading">Lade Einsätze...</p>
                </div>
                <div id="pagination" class="pagination" style="display: none;">
                    <button class="btn btn-secondary" id="prev-page-btn" disabled>← Vorherige</button>
                    <span id="page-info"></span>
                    <button class="btn btn-secondary" id="next-page-btn">Nächste →</button>
                </div>
            </section>

            <!-- Emergency Details Modal -->
            <div id="details-modal" class="modal" style="display: none;">
                <div class="modal-content modal-large">
                    <div class="modal-header">
                        <h3>Einsatz Details</h3>
                        <button class="close-btn" id="close-details-modal-btn" aria-label="Schließen">&times;</button>
                    </div>
                    <div id="emergency-details-content">
                        <p class="loading">Lade Details...</p>
                    </div>
                    <div class="modal-actions" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                        <button class="btn btn-secondary" id="end-emergency-btn" style="display: none;">🛑 Einsatz beenden</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/admin/api-client.js"></script>
    <script src="/admin/history.js"></script>
    <div id="toast-container" aria-live="polite" role="status"></div>
</body>
</html>
