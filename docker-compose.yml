version: '3.8'

services:
  alarm-messenger-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: alarm-messenger-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/alarm-messenger.db
      - SERVER_URL=${SERVER_URL:-http://localhost:3000}
      - API_SECRET_KEY=${API_SECRET_KEY:-}
      - API_SECRET_KEY_FILE=/run/secrets/api_secret_key
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - SESSION_SECRET=${SESSION_SECRET:-}
      - SESSION_SECRET_FILE=/run/secrets/session_secret
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - alarm-messenger-data:/app/data
      - ./server/logs:/app/logs
    secrets:
      - api_secret_key
      - jwt_secret
      - session_secret
    networks:
      - alarm-messenger-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy for SSL/TLS termination (Legacy)
  nginx:
    image: nginx:alpine
    container_name: alarm-messenger-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      alarm-messenger-server:
        condition: service_healthy
    networks:
      - alarm-messenger-network
    profiles:
      - with-nginx

  # Optional: Caddy Reverse Proxy für SSL/TLS Terminierung mit automatischem HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: alarm-messenger-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      alarm-messenger-server:
        condition: service_healthy
    networks:
      - alarm-messenger-network
    profiles:
      - with-caddy

secrets:
  api_secret_key:
    file: ./secrets/api_secret_key.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  session_secret:
    file: ./secrets/session_secret.txt

networks:
  alarm-messenger-network:
    driver: bridge

volumes:
  alarm-messenger-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
